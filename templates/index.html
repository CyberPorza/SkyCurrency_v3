<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCurrency | Executive Terminal v3.5</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root { 
            --neon-blue: #00d2ff; 
            --neon-green: #39ff14; 
            --neon-gold: #ffcc00; 
            --bg-dark: #050505; 
            --card-bg: #0f0f0f;
        }

        body { 
            background-color: var(--bg-dark); 
            color: #e0e0e0; 
            font-family: 'Rajdhani', sans-serif; 
            letter-spacing: 0.8px;
            min-height: 100vh;
        }

        /* Üst Bilgi Barı */
        .top-bar { 
            background: #111; 
            border-bottom: 2px solid #222; 
            padding: 12px 0; 
            font-weight: 600; 
            font-size: 0.85rem;
            box-shadow: 0 2px 15px rgba(0,0,0,0.5);
        }

        /* Ana Başlık */
        .main-header { 
            font-family: 'Orbitron', sans-serif; 
            color: var(--neon-blue); 
            text-shadow: 0 0 15px rgba(0,210,255,0.4); 
            margin: 40px 0 10px 0;
            text-transform: uppercase;
        }

        .sub-header {
            color: #555;
            font-size: 0.8rem;
            letter-spacing: 4px;
            margin-bottom: 40px;
        }

        /* Siber Kart Yapısı */
        .cyber-card { 
            background: var(--card-bg);
            border: 1px solid #222;
            border-radius: 4px;
            padding: 25px;
            position: relative;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .cyber-card:hover {
            border-color: var(--neon-blue);
            box-shadow: 0 0 25px rgba(0,210,255,0.1);
        }
