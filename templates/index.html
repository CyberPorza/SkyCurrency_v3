<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCurrency | Executive Terminal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --n-blue: #00d2ff; --n-green: #39ff14; --n-gold: #ffcc00; --bg: #050505; }
        body { background-color: var(--bg); color: #e0e0e0; font-family: 'Rajdhani', sans-serif; }
        .top-bar { background: #111; border-bottom: 2px solid #222; padding: 10px; font-weight: 600; font-size: 0.85rem; color: var(--n-blue); text-transform: uppercase; }
        .main-header { font-family: 'Orbitron', sans-serif; color: var(--n-blue); text-shadow: 0 0 15px rgba(0,210,255,0.4); margin: 40px 0; }
        .cyber-card { background: #0f0f0f; border: 1px solid #222; border-radius: 4px; padding: 25px; transition: 0.3s; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .cyber-card:hover { border-color: var(--n-blue); }
        .section-title { border-left: 4px solid var(--n-blue); padding-left: 15px; margin-bottom: 25px; font-family: 'Orbitron', sans-serif; font-size: 1rem; }
        .section-title.gold { border-left-color: var(--n-gold); }
        
        /* Bayrak ve Veri Düzeni */
        .data-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #1a1a1a; }
        .data-row:hover { background: rgba(0,210,255,0.05); padding-left: 10px; border-radius: 4px; }
        
        .info-side { display: flex; align-items: center; }
        .flag-img { width: 32px; height: 32px; border-radius: 50%; margin-right: 15px; border: 1px solid #333; }
        
        .code { font-weight: 700; font-size: 1.1rem; color: #fff; line-height: 1.2; }
        .name { font-size: 0.7rem; color: #555; text-transform: uppercase; font-weight: 600; }
        .val { font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 1.2rem; }
        .val-cur { color: var(--n-green); }
        .val-gold { color: var(--n-gold); }
    </style>
</head>
<body>

    <div class="top-bar text-center">
        <i class="fas fa-satellite me-2"></i> İSTANBUL: {{ weather.temp }}°C - {{ weather.desc | upper }} | <span id="clock">00:00:00</span>
    </div>

    <div class="container text-center">
        <h1 class="main-header">FİNANSAL KOMUTA MERKEZİ</h1>
        
        <div class="row g-4 text-start">
            <div class="col-lg-6">
                <div class="cyber-card">
                    <div class="section-title">DÖVİZ KURLARI // CANLI</div>
                    {% for c in currencies %}
                    <div class="data-row">
                        <div class="info-side">
                            <img src="https://raw.githubusercontent.com/Lukas-Straschi/CircleFlags/gh-pages/flags/{{ c.code.split('/')[0].lower()[:2] if c.code[:3] != 'GBP' else 'gb-eng' }}.svg" class="flag-img" onerror="this.src='https://raw.githubusercontent.com/Lukas-Straschi/CircleFlags/gh-pages/flags/unknown.svg'">
                            <div>
                                <span class="code">{{ c.code }}</span>
                                <span class="name">{{ c.name }}</span>
                            </div>
                        </div>
                        <div class="val val-cur">{{ c.val }} ₺</div>
                    </div>
                    {% endfor %}
                </div>
            </div>

            <div class="col-lg-6">
                <div class="cyber-card">
                    <div class="section-title gold">ALTIN PİYASASI // CANLI</div>
                    {% for g in gold %}
                    <div class="data-row">
                        <div class="info-side">
                            <img src="https://raw.githubusercontent.com/Lukas-Straschi/CircleFlags/gh-pages/flags/tr.svg" class="flag-img">
                            <div>
                                <span class="code">{{ g.name }}</span>
                                <span class="name">TÜRKİYE PİYASASI</span>
                            </div>
                        </div>
                        <div class="val val-gold">{{ g.val }} ₺</div>
                    </div>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>

    <script>
        function updateClock() { document.getElementById('clock').textContent = new Date().toLocaleTimeString('tr-TR'); }
        setInterval(updateClock, 1000); updateClock();
        setTimeout(() => location.reload(), 300000);
    </script>
</body>
</html>
