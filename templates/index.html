<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCurrency | Financial Terminal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background-color: #0a0a0a; color: #d1d1d1; font-family: 'Inter', sans-serif; }
        .weather-bar { background: #141414; border-bottom: 1px solid #222; padding: 8px 0; font-size: 0.85rem; color: #aaa; }
        .glass-card { background: #111; border: 1px solid #222; border-radius: 10px; padding: 20px; height: 100%; }
        .item-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #1a1a1a; }
        .item-name { color: #777; font-weight: 500; font-size: 0.9rem; }
        .item-val { color: #00ff88; font-family: 'Monaco', monospace; font-weight: bold; }
        .gold-color { color: #ffbb00; }
        .title-text { background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="weather-bar text-center">
        <span class="me-3"><i class="fas fa-map-marker-alt me-1"></i> ISTANBUL</span>
        <span class="me-3"><i class="fas fa-thermometer-half me-1"></i> {{ weather.temp }}°C</span>
        <span class="me-3 text-uppercase">{{ weather.desc }}</span>
        <span class="ms-4 border-start ps-4"><i class="far fa-clock me-1"></i> <span id="clock"></span></span>
    </div>

    <div class="container mt-5">
        <h3 class="text-center mb-5 title-text text-uppercase">Financial Command Center</h3>
        
        <div class="row g-4">
            <div class="col-md-6">
                <div class="glass-card shadow-lg">
                    <h6 class="text-info mb-4 text-uppercase"><i class="fas fa-exchange-alt me-2"></i> Global Currencies (TRY)</h6>
                    {% for name, val in currencies.items() %}
                    <div class="item-row">
                        <span class="item-name">{{ name }}</span>
                        <span class="item-val">{{ val }} ₺</span>
                    </div>
                    {% endfor %}
                </div>
            </div>

            <div class="col-md-6">
                <div class="glass-card shadow-lg">
                    <h6 class="text-warning mb-4 text-uppercase"><i class="fas fa-coins me-2"></i> Gold Market (TRY)</h6>
                    {% for type, price in gold.items() %}
                    <div class="item-row">
                        <span class="item-name">{{ type }} ALTIN</span>
                        <span class="item-val gold-color">{{ price }} ₺</span>
                    </div>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>

    <script>
        function updateClock() {
            document.getElementById('clock').textContent = new Date().toLocaleTimeString('tr-TR');
        }
        setInterval(updateClock, 1000);
        updateClock();
        setTimeout(() => location.reload(), 300000);
    </script>
</body>
</html>
